name: Fixed private preflight MNO

on:
  workflow_dispatch:
  push:
    paths:
      - "launch/preflight-mno.json"

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - code: m
            ref: relay/study-m-20260723
            script: whitebox_eval/train_full_global_corrector.py
          - code: n
            ref: relay/study-n-20260723
            script: whitebox_eval/train_layerwise_aux_corrector.py
          - code: o
            ref: relay/study-o-20260723
            script: whitebox_eval/train_learned_variance_closure.py
    steps:
      - name: Check out pinned private source
        uses: actions/checkout@v4
        with:
          repository: shengtenghou4-star/19
          ref: ${{ matrix.ref }}
          token: ${{ secrets.LAZARUS_REPO_TOKEN }}
          path: private-src
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile fixed private study
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile "private-src/${{ matrix.script }}"
