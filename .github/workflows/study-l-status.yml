name: Study L status probe

on:
  pull_request:
    paths:
      - "launch/study-l-status.txt"

permissions:
  contents: read
  actions: read

jobs:
  status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read fixed Study L run status
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json, os, urllib.request
          workflows = (
              "fixed-study-l-full.yml",
              "fixed-study-l-identity.yml",
              "fixed-study-l-v2-full.yml",
          )
          output = {}
          for workflow in workflows:
              url = f"https://api.github.com/repos/shengtenghou4-star/16/actions/workflows/{workflow}/runs?per_page=5"
              request = urllib.request.Request(url, headers={
                  "Accept": "application/vnd.github+json",
                  "Authorization": f"Bearer {os.environ['GH_TOKEN']}",
                  "X-GitHub-Api-Version": "2022-11-28",
                  "User-Agent": "study-l-status-probe",
              })
              with urllib.request.urlopen(request, timeout=30) as response:
                  data = json.load(response)
              output[workflow] = [{
                  "id": run["id"],
                  "run_number": run["run_number"],
                  "status": run["status"],
                  "conclusion": run["conclusion"],
                  "event": run["event"],
                  "head_sha": run["head_sha"],
                  "created_at": run["created_at"],
                  "updated_at": run["updated_at"],
              } for run in data.get("workflow_runs", [])]
          print(json.dumps(output, sort_keys=True))
          PY
