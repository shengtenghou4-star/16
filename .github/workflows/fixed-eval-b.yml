name: Fixed private evaluation B

on:
  workflow_dispatch:
  push:
    paths:
      - "launch/eval-b.json"

permissions:
  contents: read

concurrency:
  group: fixed-private-eval-b
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out pinned private source
        uses: actions/checkout@v4
        with:
          repository: shengtenghou4-star/19
          ref: relay/eval-b-20260723
          token: ${{ secrets.LAZARUS_REPO_TOKEN }}
          path: private-src
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Execute fixed evaluation privately
        shell: bash
        run: |
          set +e
          mkdir -p private-src/relay-output
          (
            cd private-src
            set +x
            python -m pip install --disable-pip-version-check \
              'flopscope>=0.8.0rc5,<0.9.0' \
              'whestbench>=0.12.0rc3,<0.13.0' \
              > relay-output/install.log 2>&1
            install_status=$?
            printf '%s\n' "$install_status" > relay-output/install_exit_status.txt

            if [ "$install_status" -eq 0 ]; then
              whest validate --estimator whitebox_eval/estimator.py \
                > relay-output/validate.log 2>&1
              validate_status=$?
            else
              validate_status=99
            fi
            printf '%s\n' "$validate_status" > relay-output/validate_exit_status.txt

            if [ "$install_status" -eq 0 ] && [ "$validate_status" -eq 0 ]; then
              HF_XET_HIGH_PERFORMANCE=1 \
              whest run \
                --estimator whitebox_eval/estimator.py \
                --dataset hf://aicrowd/arc-whestbench-public-2026@v1-phase1 \
                --format json \
                --max-threads 2 \
                > relay-output/score.json 2> relay-output/run.stderr.log
              run_status=$?
            else
              run_status=98
            fi
            printf '%s\n' "$run_status" > relay-output/run_exit_status.txt
            find relay-output -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > relay-output/SHA256SUMS
            printf '{"schema_version":"1.0","job":"fixed-eval-b","run_id":"%s","attempt":"%s","source_ref":"relay/eval-b-20260723"}\n' \
              "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" > relay-output/manifest.json
          ) > private-src/relay-output/wrapper.log 2>&1
          exit 0

      - name: Push logs and result only to private repository
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd private-src
          branch="compute-results/eval-b-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "public-compute-relay[bot]"
          git config user.email "public-compute-relay[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -f relay-output
          git commit -m "Store fixed private evaluation B result"
          git push origin "HEAD:$branch"
          printf 'Private result branch created: `%s`\n' "$branch" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce private evaluation result
        shell: bash
        run: |
          status="$(cat private-src/relay-output/run_exit_status.txt 2>/dev/null || printf '97')"
          if [ "$status" != "0" ]; then
            echo "Fixed private evaluation failed; diagnostics were preserved privately." >&2
            exit 1
          fi
