name: Private-source compute relay

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Pinned private source branch, tag, or commit
        required: true
        type: string
        default: agent/m3-public-compute
  push:
    paths:
      - "launch/distribution-shift-v2.json"

permissions:
  contents: read

concurrency:
  group: public-relay-distribution-shift-v2
  cancel-in-progress: false

env:
  SOURCE_REF: ${{ inputs.source_ref || 'agent/m3-public-compute' }}
  JULIA_NUM_THREADS: "1"
  OPENBLAS_NUM_THREADS: "1"
  OMP_NUM_THREADS: "1"

jobs:
  compute:
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        seed: [626, 627, 628, 629, 630]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out private source at the requested ref
        uses: actions/checkout@v4
        with:
          repository: shengtenghou4-star/19
          ref: ${{ env.SOURCE_REF }}
          token: ${{ secrets.LAZARUS_REPO_TOKEN }}
          path: private-src
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.8.2"
          arch: x64

      - uses: julia-actions/cache@v2
        with:
          cache-name: public-relay-distribution-shift-v2-${{ matrix.seed }}

      - name: Execute one grouped-split seed without publishing private logs
        id: compute
        shell: bash
        env:
          RELAY_SEED: ${{ matrix.seed }}
        run: |
          set +e
          mkdir -p private-src/relay-output
          (
            cd private-src
            set +x
            GNL_SEED="$RELAY_SEED" \
              RELAY_OUTPUT_ROOT=relay-output \
              bash scripts/public_compute_entry.sh distribution-shift
          ) >private-src/relay-output/relay.log 2>&1
          status=$?
          printf '%s\n' "$status" >private-src/relay-output/relay_exit_status.txt
          printf 'status=%s\n' "$status" >>"$GITHUB_OUTPUT"
          exit 0

      - name: Push logs and results only to the private repository
        if: always()
        shell: bash
        env:
          RELAY_SEED: ${{ matrix.seed }}
        run: |
          set -euo pipefail
          cd private-src
          result_branch="compute-shards/distribution-shift-v2-${GITHUB_RUN_ID}-seed-${RELAY_SEED}"
          git config user.name "public-compute-relay[bot]"
          git config user.email "public-compute-relay[bot]@users.noreply.github.com"
          git switch -c "$result_branch"
          git add -f relay-output
          git commit -m "Store public-runner distribution-shift seed ${RELAY_SEED} result"
          git push origin "HEAD:${result_branch}"
          printf 'Private shard branch created: `%s`\n' "$result_branch" >>"$GITHUB_STEP_SUMMARY"

      - name: Enforce private compute result
        if: ${{ steps.compute.outputs.status != '0' }}
        shell: bash
        run: |
          echo "The seed shard failed; full diagnostics were pushed to its private branch." >&2
          exit 1
