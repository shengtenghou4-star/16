name: Fixed private Study L J-identity audit

on:
  push:
    paths:
      - "launch/study-l-identity.json"

permissions:
  contents: read

concurrency:
  group: fixed-private-study-l-identity
  cancel-in-progress: false

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_HOME: /tmp/hf-study-l-identity
      HF_XET_HIGH_PERFORMANCE: "1"
      HF_HUB_DISABLE_PROGRESS_BARS: "1"
    steps:
      - name: Check out pinned private Study L v2 source
        uses: actions/checkout@v4
        with:
          repository: shengtenghou4-star/19
          ref: e7bd4bbf9d5e1dabd7470c5f2211cbb9021fe199
          token: ${{ secrets.LAZARUS_REPO_TOKEN }}
          path: private-src
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Audit candidate J reconstruction privately
        shell: bash
        run: |
          set +e
          mkdir -p private-src/relay-output-study-l-identity
          (
            cd private-src
            set +x
            python -m pip install --disable-pip-version-check \
              'flopscope>=0.8.0rc5,<0.9.0' \
              'whestbench>=0.12.0rc3,<0.13.0' \
              'scipy>=1.14,<2' \
              'scikit-learn>=1.5,<2' \
              > relay-output-study-l-identity/install.log 2>&1
            install_status=$?
            printf '%s\n' "$install_status" > relay-output-study-l-identity/install_exit_status.txt

            if [ "$install_status" -eq 0 ]; then
              python whitebox_study_l/run.py \
                --dataset-split mini \
                --audit-only \
                --cache relay-output-study-l-identity/mini_features.npz \
                --output relay-output-study-l-identity \
                > relay-output-study-l-identity/audit.log 2>&1
              audit_status=$?
            else
              audit_status=99
            fi
            printf '%s\n' "$audit_status" > relay-output-study-l-identity/audit_exit_status.txt
            find relay-output-study-l-identity -type f ! -name SHA256SUMS -print0 \
              | sort -z \
              | xargs -0 sha256sum > relay-output-study-l-identity/SHA256SUMS
            printf '{"schema_version":"1.0","job":"study-l-identity","run_id":"%s","attempt":"%s","source_commit":"e7bd4bbf9d5e1dabd7470c5f2211cbb9021fe199"}\n' \
              "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" > relay-output-study-l-identity/manifest.json
          ) > private-src/relay-output-study-l-identity/wrapper.log 2>&1
          exit 0

      - name: Push identity audit only to private repository
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          cd private-src
          branch="compute-results/study-l-identity-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git config user.name "public-compute-relay[bot]"
          git config user.email "public-compute-relay[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add -f relay-output-study-l-identity
          git commit -m "Store fixed private Study L identity audit"
          git push origin "HEAD:$branch"

      - name: Enforce identity audit
        shell: bash
        run: |
          status="$(cat private-src/relay-output-study-l-identity/audit_exit_status.txt 2>/dev/null || printf '97')"
          if [ "$status" != "0" ]; then
            exit 1
          fi
          python - <<'PY'
          import json
          from pathlib import Path
          report = json.loads(Path('private-src/relay-output-study-l-identity/audit.json').read_text())
          if not report.get('passed_identity_gate', False):
              raise SystemExit(2)
          PY
