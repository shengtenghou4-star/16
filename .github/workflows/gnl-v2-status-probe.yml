name: GNL v2 status probe

on:
  pull_request:
    paths:
      - "probe/gnl-v2-status.json"

permissions:
  actions: read
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read latest relay run and jobs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          run_id="$(gh api "repos/$REPO/actions/workflows/private-source-compute.yml/runs?event=workflow_dispatch&per_page=1" --jq '.workflow_runs[0].id')"
          gh api "repos/$REPO/actions/runs/$run_id" --jq '{id,status,conclusion,created_at,updated_at,html_url}'
          gh api "repos/$REPO/actions/runs/$run_id/jobs" --jq '[.jobs[]|{name,status,conclusion,started_at,completed_at}]'
