name: GNL v2 status probe

on:
  pull_request:
    paths:
      - "probe/gnl-v2-status.json"

permissions:
  actions: read
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Read latest relay run and jobs
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ['REPO']
          token = os.environ['GH_TOKEN']
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'gnl-v2-status-probe',
          }

          def get(url):
              request = urllib.request.Request(url, headers=headers)
              with urllib.request.urlopen(request, timeout=30) as response:
                  return json.load(response)

          runs = get(
              f'https://api.github.com/repos/{repo}/actions/workflows/'
              'private-source-compute.yml/runs?event=workflow_dispatch&per_page=5'
          )['workflow_runs']
          if not runs:
              print(json.dumps({'relay_runs': []}, sort_keys=True))
              raise SystemExit(0)

          run = runs[0]
          jobs = get(run['jobs_url'])['jobs']
          payload = {
              'run': {
                  'id': run['id'],
                  'status': run['status'],
                  'conclusion': run['conclusion'],
                  'created_at': run['created_at'],
                  'updated_at': run['updated_at'],
                  'html_url': run['html_url'],
              },
              'jobs': [
                  {
                      'name': job['name'],
                      'status': job['status'],
                      'conclusion': job['conclusion'],
                      'started_at': job['started_at'],
                      'completed_at': job['completed_at'],
                  }
                  for job in jobs
              ],
          }
          print(json.dumps(payload, indent=2, sort_keys=True))
          PY
