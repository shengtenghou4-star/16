name: Fixed evaluation A status probe

on:
  workflow_dispatch:
  push:
    paths:
      - "launch/eval-a-status.json"

permissions:
  actions: read
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write compact status
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p status
          gh api "repos/$REPO/actions/workflows/fixed-eval-a.yml/runs?per_page=1" \
            --jq '.workflow_runs[0] | {id,status,conclusion,event,head_sha,created_at,updated_at,html_url}' \
            > status/eval-a.json
          git config user.name "status-probe[bot]"
          git config user.email "status-probe[bot]@users.noreply.github.com"
          git add status/eval-a.json
          git commit -m "Record fixed evaluation A status [skip ci]" || exit 0
          git push
