name: Fixed evaluation status probe

on:
  workflow_dispatch:
  push:
    paths:
      - "launch/eval-a-status.json"

permissions:
  actions: read
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write compact statuses
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p status
          for name in a b c; do
            gh api "repos/$REPO/actions/workflows/fixed-eval-${name}.yml/runs?per_page=1" \
              --jq '.workflow_runs[0] | {id,status,conclusion,event,head_sha,created_at,updated_at,html_url}' \
              > "status/eval-${name}.json"
          done
          for name in d f; do
            gh api "repos/$REPO/actions/workflows/fixed-study-${name}.yml/runs?per_page=1" \
              --jq '.workflow_runs[0] | {id,status,conclusion,event,head_sha,created_at,updated_at,html_url}' \
              > "status/study-${name}.json"
          done
          git config user.name "status-probe[bot]"
          git config user.email "status-probe[bot]@users.noreply.github.com"
          git add status/eval-a.json status/eval-b.json status/eval-c.json status/study-d.json status/study-f.json
          git commit -m "Record fixed evaluation statuses [skip ci]" || exit 0
          git push
